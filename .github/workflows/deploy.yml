name: Deploy

on:
  push:
    branches: [main]

jobs:
  smoke-test:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Vercel deployment
        run: sleep 30

      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://acp.lumiguides.it.com)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Production returned $STATUS"
            exit 1
          fi
          echo "✅ Production healthy"
